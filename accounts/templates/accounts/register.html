<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #6fb1fc, #4364f7);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .user_card {
            width: 480px;
            background: #6db6b0;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #form-title {
            color: white;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .form_container {
            width: 100%;
        }

        .input-group {
            display: flex;
            width: 100%;
            margin-bottom: 20px;
            gap: 10px;
        }

        .input-group-text {
            background: #f4a940;
            color: white;
            border: none;
            padding: 14px 16px;
            flex-shrink: 0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 50px;
        }

        .form-control {
            border: none;
            background: #eaeaea;
            padding: 14px 18px;
            font-size: 16px;
            flex: 1;
            border-radius: 4px;
        }

        .btn-login {
            width: 100%;
            background: #2daae1;
            color: white;
            margin-top: 20px;
            padding: 14px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
        }

        .btn-login:hover {
            background: #1b8fc2;
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            text-decoration: none;
            font-weight: bold;
            color: #2daae1;
        }
    </style>
</head>

<body>

<div class="user_card">

    <h3 id="form-title">REGISTER ACCOUNT</h3>

    <div class="form_container">

        <form method="POST" action="">
            {% csrf_token %}

            <!-- Username -->
            <div class="input-group">
                <span class="input-group-text">
                    <i class="fas fa-user"></i>
                </span>
                {{ form.username }}
            </div>

            <!-- Email -->
            <div class="input-group">
                <span class="input-group-text">
                    <i class="fas fa-envelope-square"></i>
                </span>
                {{ form.email }}
            </div>

            <!-- Password -->
            <div class="input-group">
                <span class="input-group-text">
                    <i class="fas fa-key"></i>
                </span>
                {{ form.password1 }}
            </div>

            <!-- Confirm Password -->
            <div class="input-group">
                <span class="input-group-text">
                    <i class="fas fa-key"></i>
                </span>
                {{ form.password2 }}
            </div>

            <!-- Submit Button -->
            <input class="btn btn-login" type="submit" value="Register Account">

        </form>
    </div>

    {{form.errors}}

    <!-- LOGIN LINK SECTION -->
    <div class="links text-white">
        Already have an account?
        <a href="{% url 'login' %}">Login</a>
    </div>

    <script>
        var form_fields = document.getElementsByTagName('input')
        form_fields[1].placeholder='Username..';
        form_fields[2].placeholder='Email..';
        form_fields[3].placeholder='Enter password...';
        form_fields[4].placeholder='Re-enter Password...';

        for (var field in form_fields){
            form_fields[field].className += ' form-control'
        }
    </script>
</div>

</body>
</html>
